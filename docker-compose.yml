# ==========================================
# NodeRouter Docker Compose
# ==========================================
services:
  noderouter:
    build:
      context: .
      dockerfile: Dockerfile
    image: noderouter:latest
    container_name: noderouter
    environment:
      - NODEROUTER_PORT=5000
    ports:
      - "5000:5000"
      - "9050:9050"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./tor-data:/var/lib/tor/noderouter
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
